<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Tính Thuế VAT Ngược & Xuôi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background-color: #f4f6f8;
      color: #1f2937;
    }

    .container {
      max-width: 420px;
      margin: 40px auto;
      background: #ffffff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 18px;
      text-align: center;
      margin-bottom: 20px;
      color: #0f172a;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      display: block;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 9px 10px;
      margin-bottom: 14px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 14px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 4px;
      cursor: pointer;
      border: none;
    }

    .btn-main {
      background-color: #2563eb;
      color: white;
    }

    .btn-outline {
      background-color: #ffffff;
      border: 1px solid #2563eb;
      color: #2563eb;
    }

    .result-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .result-box strong {
      display: inline-block;
      width: 120px;
    }

    .copy-btn {
      margin-top: 10px;
      width: 100%;
      background-color: #e5e7eb;
      color: #111827;
    }

    .copied {
      text-align: center;
      font-size: 13px;
      color: #059669;
      margin-top: 6px;
    }

    footer {
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      margin-top: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>TÍNH THUẾ VAT (NGƯỢC & XUÔI)</h1>

    <label>Số tiền</label>
    <input id="amount" placeholder="Ví dụ: 1000000" />

    <label>Thuế suất VAT (%)</label>
    <input id="vatRate" type="number" value="10" />

    <div class="buttons">
      <button class="btn-main" onclick="calcForward()">Tính xuôi</button>
      <button class="btn-outline" onclick="calcReverse()">Tính ngược</button>
    </div>

    <div id="result" class="result-box" style="display:none;"></div>

    <button class="copy-btn" onclick="copyResult()" id="copyBtn" style="display:none;">
      📋 Copy kết quả
    </button>

    <div id="copied" class="copied"></div>

    <footer>
      Web tính VAT – dùng cho kế toán & kinh doanh
    </footer>
  </div>

<script>
  let lastText = "";

 function f(n) {
  return n.toLocaleString("en-US") + " VND";
}
  }

  function showResult(html, text) {
    document.getElementById("result").innerHTML = html;
    document.getElementById("result").style.display = "block";
    document.getElementById("copyBtn").style.display = "block";
    document.getElementById("copied").innerText = "";
    lastText = text;
  }

  function calcForward() {
    const base = parseFloat(amount.value);
    const rate = parseFloat(vatRate.value);
    if (isNaN(base) || isNaN(rate)) return;

    const vat = base * rate / 100;
    const total = base + vat;

    showResult(
      `<div><strong>Giá chưa VAT:</strong> ${f(base)}</div>
       <div><strong>VAT:</strong> ${f(vat)}</div>
       <div><strong>Tổng tiền:</strong> ${f(total)}</div>`,
      `TÍNH XUÔI\nGiá chưa VAT: ${f(base)}\nVAT: ${f(vat)}\nTổng tiền: ${f(total)}`
    );
  }

  function calcReverse() {
    const total = parseFloat(amount.value);
    const rate = parseFloat(vatRate.value);
    if (isNaN(total) || isNaN(rate)) return;

    const base = total / (1 + rate / 100);
    const vat = total - base;

    showResult(
      `<div><strong>Tổng tiền:</strong> ${f(total)}</div>
       <div><strong>VAT:</strong> ${f(vat)}</div>
       <div><strong>Giá chưa VAT:</strong> ${f(base)}</div>`,
      `TÍNH NGƯỢC\nGiá chưa VAT: ${f(base)}\nVAT: ${f(vat)}\nTổng tiền: ${f(total)}`
    );
  }

  function copyResult() {
    navigator.clipboard.writeText(lastText);
    document.getElementById("copied").innerText = "✅ Đã copy kết quả";
  }
</script>

</body>
</html>
